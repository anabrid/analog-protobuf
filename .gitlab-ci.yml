workflow:
  rules:
    - if: $CI_COMMIT_BRANCH

stages:
  - publish

variables:
  GIT_DEPTH: 0

# Mirror `main` to the public GitHub repository. Runs automatically on every
# commit to `main`; can be triggered manually from any other branch.
publish:github:
  image:
    name: alpine:latest
  stage: publish
  before_script:
    - apk add --no-cache git
  script:
    - git config --global user.name "GitLab CI"
    - git config --global user.email "ci@gitlab"
    - git fetch origin --tags
    - git checkout -B main origin/main
    - git remote add github https://${GITHUB_TOKEN}@github.com/anabrid/analog-protobuf.git
    - git push github HEAD:main
    - git push --tags github
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - when: manual
      allow_failure: true
